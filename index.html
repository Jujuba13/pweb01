<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Criando uma Página Web com div</title>
    <style>
       
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 40px 20px;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        
        .moldura-principal {
            background-color: #0b5a30; 
            width: 100%;
            max-width: 900px;
            padding: 20px; 
            border-radius: 4px;
        }

        .header {
            background-color: #118244; 
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px; 
            border: 2px solid #ffffff; 
        }

        .main-container {
            display: flex;
            margin-bottom: 20px; 
            gap: 20px; 
        }

      
        .sidebar {
            background-color: #ffffff; 
            width: 25%; 
            padding: 15px; 
            border: 1px solid #b0c4de;
            min-height: 250px;
        }

        
        .content {
            background-color: #ffffff; 
            width: 75%; 
            padding: 15px; 
            border: 1px solid #b0c4de;
        }

        
        .quadro-cinza {
            background-color: #e0e0e0; 
            padding: 15px;
            border: 1px solid #a0a0a0; 
            height: 100%; 
        }

    
        .quadro-cinza ul {
            list-style-position: inside;
        }

        .quadro-cinza li {
            margin-bottom: 12px;
            color: #333;
        }

        
        .quadro-cinza p {
            margin-bottom: 15px;
            color: #333;
            line-height: 1.5;
        }
        
        
        .quadro-cinza p:last-child {
            margin-bottom: 0;
        }

        
        .footer {
            background-color: #1a252f; 
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="moldura-principal">
        
        <div class="header">
            Minha Página Web
        </div>

        <div class="main-container">
            
            <div class="sidebar">
                <div class="quadro-cinza">
                    <ul>
                        <li>Item 1</li>
                        <li>Item 2</li>
                        <li>Item 3</li>
                    </ul>
                </div>
            </div>

            <div class="content">
                <div class="quadro-cinza">
                    <p>Este é o conteúdo principal da página.</p>
                    <p>Adicione mais parágrafos ou elementos conforme necessário.</p>
                </div>
            </div>

        </div>

        <div class="footer">
            Rodapé da Página
        </div>

    </div>

</body>
</html>
